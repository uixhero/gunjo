name: Deploy Docs (Production)

# Auto-deploy the docs/patterns site to Vercel on every push to main, so the
# live gunjo.jp never lags the repo. The repo lives on the `uixhero` GitHub user
# account but Vercel is logged in as `eemlis7-ke`, so Vercel's native Git
# integration can't connect across accounts — a token deploy bypasses that. (#278)
#
# main is branch-protected (PR + design-verify required), so every push here is
# already CI-green and safe to deploy. The job no-ops cleanly until the secrets
# are configured, so it won't red-X main before VERCEL_TOKEN is added.

on:
  push:
    branches:
      - main
  # Manual trigger — deploy the current main on demand (e.g. to clear a backlog
  # right after the secrets are first configured, without waiting for a merge).
  workflow_dispatch:

# A newer merge supersedes an in-flight production deploy.
concurrency:
  group: deploy-docs-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN not set — skipping auto-deploy. Add VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID repo secrets to enable it (#278)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.guard.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Vercel CLI
        if: steps.guard.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        if: steps.guard.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build project artifacts
        if: steps.guard.outputs.configured == 'true'
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to production
        if: steps.guard.outputs.configured == 'true'
        # --archive=tgz uploads the build as a single tarball; the prebuilt
        # output exceeds Vercel's 15k-file upload limit (~18k files) otherwise.
        run: vercel deploy --prebuilt --prod --archive=tgz --token="${{ secrets.VERCEL_TOKEN }}"
